sample:
  name: Secure Application Pairing
tests:
  sample.bluetooth.sap.central:
    build_only: true
    platform_allow:
      - nrf54l15bsim/nrf54l15/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp/ns
      - xiao_nrf54l15/nrf54l15/cpuapp
      - xiao_nrf54l15/nrf54l15/cpuapp/ns
    integration_platforms:
      - nrf54l15bsim/nrf54l15/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp/ns
      - xiao_nrf54l15/nrf54l15/cpuapp
      - xiao_nrf54l15/nrf54l15/cpuapp/ns
    tags:
      - bluetooth
      - crypto
  sample.bluetooth.sap.peripheral:
    build_only: true
    extra_args: EXTRA_CONF_FILE=peripheral.conf
    platform_allow:
      - nrf54l15bsim/nrf54l15/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp/ns
      - xiao_nrf54l15/nrf54l15/cpuapp
      - xiao_nrf54l15/nrf54l15/cpuapp/ns
    integration_platforms:
      - nrf54l15bsim/nrf54l15/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp/ns
      - xiao_nrf54l15/nrf54l15/cpuapp
      - xiao_nrf54l15/nrf54l15/cpuapp/ns
    tags:
      - bluetooth
      - crypto

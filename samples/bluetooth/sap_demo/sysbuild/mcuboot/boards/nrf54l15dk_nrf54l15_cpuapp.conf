# The DK root build does not need a UART-facing MCUboot console. Disabling
# it keeps the stock /ns partitioning viable without the oversized direct-XIP
# DK partition map.
CONFIG_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG=n
CONFIG_MCUBOOT_LOG_LEVEL_OFF=y
CONFIG_BOOT_BANNER=n
CONFIG_NCS_BOOT_BANNER=n
CONFIG_CBPRINTF_NANO=y
CONFIG_ASSERT=n
CONFIG_ASSERT_VERBOSE=n
CONFIG_EARLY_CONSOLE=n

# The XIAO nRF54L15 /ns build is stable with GRTC as the system timer.
CONFIG_NRF_GRTC_TIMER=y
CONFIG_NRF_GRTC_START_SYSCOUNTER=y
# CONFIG_CORTEX_M_SYSTICK is not set
CONFIG_SYS_CLOCK_HW_CYCLES_PER_SEC=128000000

# The XIAO /ns leaf demo runs without persisted settings for now. This avoids
# a settings backend init failure on the board while keeping BLE security and
# SAP re-auth working after reconnect/reset.
# CONFIG_SETTINGS is not set
# CONFIG_SETTINGS_NVS is not set
# CONFIG_NVS is not set
# CONFIG_BT_SETTINGS is not set
